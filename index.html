<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Country Info App</title>

        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="container">

            <!-- Theme Toggle -->
            <button class="theme-toggle" id="themeToggle">
                🌙 Dark Mode
            </button>

            <!-- Title -->
            <h1>🌍 Country Info App</h1>

            <!-- Search Section -->
            <div class="search-box">

                <input
                    type="text"
                    id="countryInput"
                    placeholder="Enter country name...">

                <button id="searchBtn">
                    Search
                </button>

                <button id="randomBtn">
                    Random Country
                </button>

            </div>

            <!-- Loader -->
            <div class="loader" id="loader"></div>

            <!-- Error Message -->
            <p class="error-message" id="errorMessage">
                Country not found!
            </p>

            <!-- Country Card -->
            <div class="country-card hidden" id="countryCard">

                <img
                    id="countryFlag"
                    src
                    alt="Country Flag">

                <h2 id="countryName">
                    Country Name
                </h2>

                <p><strong>Capital:</strong> <span id="capital">-</span></p>

                <p><strong>Population:</strong> <span
                        id="population">-</span></p>

                <p><strong>Currency:</strong> <span id="currency">-</span></p>

                <p><strong>Language:</strong> <span id="language">-</span></p>

                <p><strong>Region:</strong> <span id="region">-</span></p>

            </div>

        </div>

        <script src="script.js"></script>

    </body>
</html>
