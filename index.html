<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Country Info App</title>

        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="container">

            <!-- Theme Toggle -->
            <button class="theme-toggle" id="themeToggle">
                🌙 Dark Mode
            </button>

            <h1>🌍 Country Info App</h1>

            <div class="search-box">

                <div class="input-wrapper">

                    <input
                        type="text"
                        id="countryInput"
                        placeholder="Enter country name..."
                        autocomplete="off">

                    <ul id="suggestionsList"></ul>

                </div>

                <button id="searchBtn">Search</button>

                <button id="randomBtn">Random Country</button>

            </div>

            <div class="loader" id="loader"></div>

            <p class="error-message" id="errorMessage">
                Country not found!
            </p>

            <div class="country-card hidden" id="countryCard">

                <img id="countryFlag" src alt="Country Flag">

                <h2 id="countryName"></h2>

                <p><strong>Capital:</strong> <span id="capital"></span></p>

                <p><strong>Population:</strong> <span
                        id="population"></span></p>

                <p><strong>Currency:</strong> <span id="currency"></span></p>

                <p><strong>Language:</strong> <span id="language"></span></p>

                <p><strong>Region:</strong> <span id="region"></span></p>

                <!-- Copy Button -->
                <button id="copyBtn">📋 Copy Info</button>

                <!-- Favorite -->
                <button id="favoriteBtn">❤️ Add To Favorites</button>

            </div>

            <div class="favorites-section">

                <h3>⭐ Favorite Countries</h3>

                <ul id="favoritesList"></ul>

            </div>

            <!-- Last Search -->
            <p id="lastSearch">Last search: None</p>

        </div>

        <script src="script.js"></script>

    </body>
</html>
